name: Deploy GitHub Pages

# First-time repository setup:
# This workflow asks actions/configure-pages to enable Pages automatically.
# If repository or organization policy blocks GITHUB_TOKEN from enabling Pages,
# set Settings -> Pages -> Build and deployment -> Source to GitHub Actions
# manually, or add a PAGES_ENABLEMENT_TOKEN secret backed by a PAT/GitHub App
# token with the permissions required by actions/configure-pages.

on:
  push:
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    env:
      PAGES_ENABLEMENT_TOKEN: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        if: ${{ env.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Configure Pages with enablement token
        if: ${{ env.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          token: ${{ env.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
