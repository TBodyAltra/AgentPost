<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentPost Dashboard</title>
  <style>
    :root {
      --bg-grad-1: #fbfbfd;
      --bg-grad-2: #eef0f4;
      --surface: rgba(255, 255, 255, 0.72);
      --surface-solid: #ffffff;
      --surface-2: #f0f1f4;
      --hairline: rgba(0, 0, 0, 0.08);
      --hairline-strong: rgba(0, 0, 0, 0.14);
      --text: #1d1d1f;
      --text-2: #6e6e73;
      --text-3: #8e8e93;
      --accent: #0071e3;
      --accent-press: #0058b0;
      --accent-soft: rgba(0, 113, 227, 0.12);
      --ok: #34c759;
      --warn: #ff9f0a;
      --bad: #ff3b30;
      --cross: #af52de;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
      --shadow-lg: 0 18px 50px rgba(0,0,0,0.18);
      --radius-lg: 20px;
      --radius: 16px;
      --radius-sm: 10px;
      --spring: cubic-bezier(0.16, 1, 0.3, 1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", "PingFang SC", system-ui, sans-serif;
      --mono: "SF Mono", ui-monospace, "SFMono-Regular", "Cascadia Code", monospace;
    }
    /* Dark palette: auto (system) + explicit override */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-grad-1: #1c1c1e; --bg-grad-2: #000000;
        --surface: rgba(28,28,30,0.72); --surface-solid: #1c1c1e; --surface-2: #2c2c2e;
        --hairline: rgba(255,255,255,0.10); --hairline-strong: rgba(255,255,255,0.18);
        --text: #f5f5f7; --text-2: #aeaeb2; --text-3: #8e8e93;
        --accent: #0a84ff; --accent-press: #409cff; --accent-soft: rgba(10,132,255,0.18);
        --ok: #30d158; --warn: #ff9f0a; --bad: #ff453a; --cross: #bf5af2;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.4); --shadow-md: 0 6px 24px rgba(0,0,0,0.5); --shadow-lg: 0 24px 60px rgba(0,0,0,0.7);
      }
    }
    :root[data-theme="dark"] {
      --bg-grad-1: #1c1c1e; --bg-grad-2: #000000;
      --surface: rgba(28,28,30,0.72); --surface-solid: #1c1c1e; --surface-2: #2c2c2e;
      --hairline: rgba(255,255,255,0.10); --hairline-strong: rgba(255,255,255,0.18);
      --text: #f5f5f7; --text-2: #aeaeb2; --text-3: #8e8e93;
      --accent: #0a84ff; --accent-press: #409cff; --accent-soft: rgba(10,132,255,0.18);
      --ok: #30d158; --warn: #ff9f0a; --bad: #ff453a; --cross: #bf5af2;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4); --shadow-md: 0 6px 24px rgba(0,0,0,0.5); --shadow-lg: 0 24px 60px rgba(0,0,0,0.7);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    body {
      font-family: var(--font);
      background:
        radial-gradient(1200px 600px at 20% -10%, var(--bg-grad-1), transparent 60%),
        radial-gradient(1000px 500px at 100% 0%, var(--accent-soft), transparent 55%),
        linear-gradient(180deg, var(--bg-grad-1), var(--bg-grad-2));
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.47;
      letter-spacing: -0.01em;
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }

    /* ---------- Login ---------- */
    .login-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(0,0,0,0.28);
      backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
      transition: opacity 0.35s var(--spring);
    }
    .login-overlay.hidden { opacity: 0; pointer-events: none; }
    .login-card {
      background: var(--surface-solid); border: 1px solid var(--hairline); border-radius: var(--radius-lg);
      padding: 2.5rem 2.25rem; width: min(400px, 100%); box-shadow: var(--shadow-lg); text-align: center;
      animation: sheetIn 0.5s var(--spring);
    }
    .login-overlay.hidden .login-card { animation: sheetOut 0.3s var(--spring) forwards; }
    @keyframes sheetIn { from { opacity: 0; transform: scale(0.92) translateY(16px); } to { opacity: 1; transform: none; } }
    @keyframes sheetOut { to { opacity: 0; transform: scale(0.96) translateY(8px); } }
    .login-logo {
      width: 56px; height: 56px; margin: 0 auto 1.1rem; border-radius: 15px;
      background: linear-gradient(160deg, #0a84ff, #0071e3 60%, #0058b0);
      display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 22px rgba(0,113,227,0.35);
    }
    .login-logo svg { width: 30px; height: 30px; }
    .login-card h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
    .login-card p { color: var(--text-2); font-size: 0.92rem; margin-bottom: 1.6rem; line-height: 1.4; }
    .login-card input {
      width: 100%; padding: 0.85rem 1rem; background: var(--surface-2); border: 1px solid transparent;
      border-radius: 12px; color: var(--text); font-family: var(--mono); font-size: 0.85rem;
      margin-bottom: 0.9rem; transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .login-card input::placeholder { color: var(--text-3); font-family: var(--font); }
    .login-card input:focus { outline: none; border-color: var(--accent); background: var(--surface-solid); box-shadow: 0 0 0 4px var(--accent-soft); }
    .btn {
      padding: 0.7rem 1.4rem; border: none; border-radius: 12px; background: var(--accent); color: #fff;
      font-weight: 600; cursor: pointer; font-size: 0.95rem; font-family: var(--font);
      transition: background 0.18s, transform 0.12s var(--spring), box-shadow 0.18s;
    }
    .btn:hover { background: var(--accent-press); }
    .btn:active { transform: scale(0.96); }
    .btn-full { width: 100%; }
    .btn-ghost {
      background: var(--surface-2); color: var(--text); padding: 0.45rem 1rem; font-size: 0.86rem; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center; line-height: 1.1; white-space: nowrap;
    }
    .btn-ghost:hover { background: var(--hairline-strong); }
    .login-error { color: var(--bad); font-size: 0.85rem; margin-top: 0.7rem; min-height: 1.2em; }

    /* ---------- Top toolbar (no nav bar) ---------- */
    .top-bar {
      position: sticky; top: 0; z-index: 40; padding: 0.65rem 1.5rem;
      border-bottom: 1px solid var(--hairline); display: flex; flex-wrap: wrap; align-items: center; gap: 0.65rem 0.9rem;
      background: var(--surface); backdrop-filter: saturate(180%) blur(20px); -webkit-backdrop-filter: saturate(180%) blur(20px);
    }
    .header-meta {
      color: var(--text-2); font-size: 0.8rem; flex: 1 1 200px; min-width: 0;
      display: flex; flex-wrap: wrap; gap: 0.4rem 0.6rem; align-items: center;
    }
    .top-actions {
      display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-left: auto;
    }
    .meta-chip {
      display: inline-flex; align-items: center; gap: 0.3rem; background: var(--surface-2);
      padding: 0.18rem 0.6rem; border-radius: 100px; font-size: 0.74rem; color: var(--text-2); white-space: nowrap;
    }
    .meta-chip code { font-family: var(--mono); color: var(--text); }

    /* iOS segmented control */
    .segmented {
      display: inline-flex; background: var(--surface-2); border-radius: 9px; padding: 2px; gap: 2px; position: relative;
    }
    .segmented button {
      border: none; background: transparent; color: var(--text-2); font-family: var(--font);
      font-size: 0.78rem; font-weight: 500; min-height: 28px; padding: 0.35rem 0.65rem; border-radius: 7px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.25rem;
      line-height: 1.1; white-space: nowrap; transition: color 0.2s; z-index: 1;
    }
    #filter-seg button { font-size: 0.72rem; padding: 0.35rem 0.55rem; }
    .segmented button.active { color: var(--text); background: var(--surface-solid); box-shadow: var(--shadow-sm); font-weight: 600; }
    .segmented button svg { width: 14px; height: 14px; }

    .icon-btn {
      width: 34px; height: 34px; border-radius: 9px; border: none; background: var(--surface-2); color: var(--text-2);
      display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
      transition: background 0.18s, transform 0.15s var(--spring);
    }
    .icon-btn:hover { background: var(--hairline-strong); color: var(--text); }
    .icon-btn:active { transform: scale(0.9); }
    .icon-btn svg { width: 17px; height: 17px; }
    .icon-btn.spinning svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---------- Stats ---------- */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.9rem; padding: 1.4rem 1.5rem 0.4rem; }
    .stat {
      background: var(--surface-solid); border: 1px solid var(--hairline); border-radius: var(--radius);
      padding: 1.05rem 1.2rem; box-shadow: var(--shadow-sm); animation: rise 0.5s var(--spring) backwards;
    }
    .stat:nth-child(2) { animation-delay: 0.05s; }
    .stat:nth-child(3) { animation-delay: 0.1s; }
    .stat:nth-child(4) { animation-delay: 0.15s; }
    @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
    .stat .label { font-size: 0.78rem; color: var(--text-2); font-weight: 500; }
    .stat .value { font-size: 2rem; font-weight: 700; margin-top: 0.2rem; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
    .stat .value.small { font-size: 1.2rem; font-weight: 600; }
    .skeleton { background: linear-gradient(100deg, var(--surface-2) 30%, var(--hairline) 50%, var(--surface-2) 70%); background-size: 200% 100%; animation: shimmer 1.3s infinite; border-radius: 6px; color: transparent !important; }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ---------- Toast ---------- */
    .toast-wrap { position: fixed; top: 14px; left: 50%; transform: translateX(-50%); z-index: 90; display: flex; flex-direction: column; gap: 0.5rem; align-items: center; pointer-events: none; }
    .toast {
      background: var(--surface-solid); border: 1px solid var(--hairline); border-radius: 100px;
      padding: 0.6rem 1.1rem; box-shadow: var(--shadow-lg); font-size: 0.86rem; display: flex; align-items: center; gap: 0.5rem;
      animation: toastIn 0.4s var(--spring); max-width: 90vw;
    }
    .toast.out { animation: toastOut 0.3s var(--spring) forwards; }
    @keyframes toastIn { from { opacity: 0; transform: translateY(-16px) scale(0.95); } to { opacity: 1; transform: none; } }
    @keyframes toastOut { to { opacity: 0; transform: translateY(-12px) scale(0.96); } }
    .toast .tdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .toast.err .tdot { background: var(--bad); }
    .toast.ok .tdot { background: var(--ok); }

    /* ---------- Layout ---------- */
    .layout { display: grid; grid-template-columns: 1fr 360px; gap: 1.25rem; padding: 1.1rem 1.5rem 2rem; align-items: start; }
    @media (max-width: 1000px) { .layout { grid-template-columns: 1fr; } }
    .card { background: var(--surface-solid); border: 1px solid var(--hairline); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

    .panel-head {
      padding: 1.05rem 1.3rem 0.9rem; display: flex; flex-wrap: wrap; align-items: center; gap: 0.65rem 0.8rem;
      border-bottom: 1px solid var(--hairline);
    }
    .panel-head .segmented { flex-shrink: 0; }
    .panel-title { font-size: 1.05rem; font-weight: 600; letter-spacing: -0.02em; }
    .spacer { flex: 1; }

    .refresh-note {
      font-size: 0.76rem; color: var(--text-3); display: inline-flex; align-items: center; gap: 0.4rem;
      line-height: 1; white-space: nowrap; flex-shrink: 0;
    }
    .live-dot {
      width: 7px; height: 7px; min-width: 7px; min-height: 7px; flex-shrink: 0;
      border-radius: 50%; background: var(--ok); animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1.1rem; padding: 0.8rem 1.3rem; font-size: 0.78rem; border-bottom: 1px solid var(--hairline); }
    .legend-item { display: flex; align-items: center; gap: 0.4rem; color: var(--text-2); }
    .dot { width: 9px; height: 9px; border-radius: 50%; }

    .graph-wrap { position: relative; min-height: 440px; padding: 0.5rem; }
    #graph-svg { width: 100%; height: 100%; min-height: 440px; display: block; }
    #graph-svg circle[data-email] { transition: r 0.2s var(--spring); }
    .graph-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: var(--text-3); font-size: 0.9rem; flex-direction: column; gap: 0.5rem; }

    /* Search */
    .search-bar { padding: 1.1rem 0 0; }
    .search-field { position: relative; }
    .search-field svg { position: absolute; left: 0.85rem; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--text-3); pointer-events: none; }
    .search-field input {
      width: 100%; padding: 0.65rem 2.2rem; background: var(--surface-solid); border: 1px solid var(--hairline);
      border-radius: 12px; color: var(--text); font-family: var(--font); font-size: 0.9rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-field input::placeholder { color: var(--text-3); }
    .search-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .search-clear {
      position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); width: 20px; height: 20px;
      border: none; background: var(--text-3); color: var(--surface-solid); border-radius: 50%; cursor: pointer;
      display: none; align-items: center; justify-content: center; font-size: 0.7rem; line-height: 1;
    }
    .search-field.has-value .search-clear { display: flex; }

    /* Domains */
    .domain-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1rem; padding: 1rem 0 0; }
    .domain-card { overflow: hidden; transition: transform 0.25s var(--spring), box-shadow 0.25s; animation: rise 0.5s var(--spring) backwards; }
    .domain-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .domain-card.default { box-shadow: 0 0 0 1.5px var(--accent), var(--shadow-sm); border-color: transparent; }
    .domain-card.dimmed { opacity: 0.4; }
    .domain-head { padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--hairline); }
    .domain-head .name { font-weight: 600; font-family: var(--mono); font-size: 0.85rem; word-break: break-all; }
    .badge { font-size: 0.66rem; padding: 0.2rem 0.5rem; border-radius: 100px; background: var(--accent); color: #fff; font-weight: 600; flex-shrink: 0; }
    .pill { font-size: 0.7rem; padding: 0.18rem 0.55rem; border-radius: 100px; background: var(--surface-2); color: var(--text-2); flex-shrink: 0; }
    .domain-body { padding: 0.45rem; }
    .mailbox-row {
      padding: 0.6rem 0.7rem; border-radius: 10px; cursor: pointer; font-size: 0.85rem;
      display: flex; justify-content: space-between; align-items: center; gap: 0.5rem;
      transition: background 0.15s, transform 0.12s var(--spring);
    }
    .mailbox-row .mb-name { font-family: var(--mono); font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .mailbox-row:hover { background: var(--surface-2); }
    .mailbox-row:active { transform: scale(0.98); }
    .mailbox-row.selected { background: var(--accent-soft); box-shadow: inset 0 0 0 1px var(--accent); }
    .mailbox-row.hide { display: none; }
    .mailbox-row mark { background: var(--accent-soft); color: var(--accent); border-radius: 3px; padding: 0 1px; }
    .queue-badge { font-size: 0.7rem; background: var(--surface-2); padding: 0.12rem 0.45rem; border-radius: 100px; color: var(--text-3); flex-shrink: 0; }
    .queue-badge.has-msg { background: rgba(52,199,89,0.16); color: var(--ok); font-weight: 600; }

    /* Detail */
    .detail-panel { position: sticky; top: 58px; overflow: hidden; }
    .detail-body { padding: 1.25rem 1.3rem; max-height: calc(100vh - 150px); overflow: auto; }
    .detail-body.swap { animation: detailSwap 0.32s var(--spring); }
    @keyframes detailSwap { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: none; } }
    .detail-empty { color: var(--text-3); font-size: 0.92rem; padding: 3rem 1rem; text-align: center; }
    .detail-empty svg { width: 38px; height: 38px; opacity: 0.4; margin-bottom: 0.6rem; }
    .detail-email { font-family: var(--mono); font-size: 1.05rem; font-weight: 600; word-break: break-all; margin-bottom: 1rem; letter-spacing: -0.01em; }
    .detail-section { margin-bottom: 1.4rem; }
    .detail-section:last-child { margin-bottom: 0; }
    .detail-section h3 { font-size: 0.72rem; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.6rem; font-weight: 600; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .detail-section h3 .chev { transition: transform 0.25s var(--spring); }
    .detail-section.collapsed h3 .chev { transform: rotate(-90deg); }
    .detail-section.collapsed .sec-body { display: none; }
    .kv-grid { display: grid; grid-template-columns: auto 1fr; gap: 0.4rem 0.85rem; font-size: 0.85rem; }
    .kv-grid dt { color: var(--text-2); }
    .kv-grid dd { text-align: right; word-break: break-all; }
    .detail-kv { font-size: 0.85rem; margin-bottom: 0.3rem; }
    .detail-kv strong { color: var(--text-2); font-weight: 500; margin-right: 0.4rem; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
    .tag { font-size: 0.74rem; padding: 0.25rem 0.55rem; border-radius: 100px; background: var(--surface-2); color: var(--text); }
    .link-list { max-height: 220px; overflow: auto; }
    .link-row { padding: 0.45rem 0; border-bottom: 1px solid var(--hairline); display: flex; gap: 0.5rem; align-items: center; font-size: 0.78rem; cursor: pointer; transition: background 0.15s; border-radius: 6px; }
    .link-row:hover { background: var(--surface-2); }
    .link-row:last-child { border-bottom: none; }
    .link-row .dir { font-family: var(--mono); font-size: 0.72rem; color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-pill { font-size: 0.66rem; padding: 0.15rem 0.5rem; border-radius: 100px; flex-shrink: 0; font-weight: 600; }
    .status-allowed { background: rgba(52,199,89,0.16); color: var(--ok); }
    .status-allowlisted { background: rgba(175,82,222,0.16); color: var(--cross); }
    .status-blocked { background: rgba(255,59,48,0.16); color: var(--bad); }
    .status-cross_domain_blocked { background: rgba(255,159,10,0.16); color: var(--warn); }

    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--hairline-strong); border-radius: 100px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
  <div id="login" class="login-overlay">
    <div class="login-card">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m3 6 9 6 9-6"/></svg>
      </div>
      <h1>AgentPost</h1>
      <p id="login-desc">输入网关 API Token 查看注册域、邮箱投递策略与账户详情。</p>
      <input type="password" id="token-input" placeholder="AGENTPOST_API_TOKEN" autocomplete="off">
      <button type="button" id="login-btn" class="btn btn-full">连接</button>
      <div id="login-error" class="login-error"></div>
    </div>
  </div>

  <div class="toast-wrap" id="toast-wrap"></div>

  <div class="top-bar">
    <div class="header-meta" id="gateway-meta"></div>
    <div class="top-actions">
      <div class="segmented" id="lang-seg" role="tablist" aria-label="Language">
        <button type="button" data-lang="zh-hans" class="active">简</button>
        <button type="button" data-lang="zh-hant">繁</button>
        <button type="button" data-lang="en">EN</button>
      </div>
      <div class="segmented" id="theme-seg" role="tablist" aria-label="Theme">
        <button data-theme="auto" class="active" title="跟随系统">自动</button>
        <button data-theme="light" title="浅色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
        <button data-theme="dark" title="深色">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>
      </div>
      <button type="button" class="icon-btn" id="refresh-btn" title="Refresh">

    let lang = "zh-hans";
    let state = { data: null, selected: null, token: "", filter: "all", search: "", prevStats: {} };
    let refreshTimer = null;

    const $ = (id) => document.getElementById(id);

    function t(key) {
      const pack = I18N[lang] || I18N["zh-hans"];
      return pack[key] ?? I18N["zh-hans"][key] ?? key;
    }

    function statusLabel(status) {
      return deliveryPermits(status) ? t("statusAllowed") : t("statusDenied");
    }

    function statusClass(status) {
      return deliveryPermits(status) ? "allowed" : "blocked";
    }

    function deliveryPermits(status) {
      return status === "allowed" || status === "allowlisted";
    }

    function countAllowedEdges(links) {
      return links.reduce((n, l) => {
        const fwd = deliveryPermits(l.forward_status);
        const rev = deliveryPermits(l.reverse_status);
        if (fwd && rev) return n + 1;
        if (fwd || rev) return n + 1;
        return n;
      }, 0);
    }

    function edgeColor(status) {
      return status === "allowlisted" ? STATUS_COLORS.allowlisted : STATUS_COLORS.allowed;
    }

    function detectLang() {
      const stored = localStorage.getItem(LANG_KEY);
      if (stored && I18N[stored]) return stored;
      const nav = (navigator.language || "").toLowerCase();
      if (nav.startsWith("en")) return "en";
      if (nav === "zh-tw" || nav === "zh-hk" || nav === "zh-mo" || nav.includes("hant")) return "zh-hant";
      if (nav.startsWith("zh")) return "zh-hans";
      return "zh-hans";
    }

    function applyLangUI() {
      document.documentElement.lang = lang === "en" ? "en" : (lang === "zh-hant" ? "zh-Hant" : "zh-Hans");
      $("login-desc").textContent = t("loginDesc");
      $("login-btn").textContent = t("loginBtn");
      $("logout-btn").textContent = t("logout");
      $("refresh-btn").title = t("refresh");
      $("topology-title").textContent = t("topology");
      const note = $("refresh-note");
      note.textContent = "";
      const dot = document.createElement("span");
      dot.className = "live-dot";
      dot.setAttribute("aria-hidden", "true");
      note.append(dot, document.createTextNode(t("live")));
      $("filter-all").textContent = t("filterAll");
      $("filter-cross").textContent = t("filterCross");
      $("filter-blocked").textContent = t("filterBlocked");
      $("legend-allowed").textContent = t("legendAllowed");
      $("legend-mutual").textContent = t("legendMutual");
      $("detail-title").textContent = t("detailTitle");
      $("detail-empty-text").textContent = t("detailEmpty");
      $("search-input").placeholder = t("searchPlaceholder");
      const themeSeg = $("theme-seg");
      const autoThemeBtn = themeSeg.querySelector('[data-theme="auto"]');
      autoThemeBtn.title = t("themeAuto");
      autoThemeBtn.textContent = t("themeAutoBtn");
      themeSeg.querySelector('[data-theme="light"]').title = t("themeLight");
      themeSeg.querySelector('[data-theme="dark"]').title = t("themeDark");
      $("lang-seg").querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.lang === lang));
      if (state.data) {
        renderStats(state.data);
        renderDomains(state.data);
        renderGraph(state.data);
        if (state.selected) renderDetail(state.data, state.selected, false);
      }
    }

    function setLang(next) {
      lang = I18N[next] ? next : "zh-hans";
      localStorage.setItem(LANG_KEY, lang);
      applyLangUI();
    }

    $("lang-seg").querySelectorAll("button").forEach((b) => b.addEventListener("click", () => setLang(b.dataset.lang)));
    setLang(detectLang());

    /* ---------- Theme ---------- */
    function applyTheme(mode) {
      if (mode === "auto") document.documentElement.removeAttribute("data-theme");
      else document.documentElement.setAttribute("data-theme", mode);
      localStorage.setItem(THEME_KEY, mode);
      $("theme-seg").querySelectorAll("button").forEach((b) => b.classList.toggle("active", b.dataset.theme === mode));
      if (state.data) renderGraph(state.data);
    }
    $("theme-seg").querySelectorAll("button").forEach((b) => b.addEventListener("click", () => applyTheme(b.dataset.theme)));
    applyTheme(localStorage.getItem(THEME_KEY) || "auto");

    /* ---------- Toast ---------- */
    function showToast(msg, kind) {
      const t = document.createElement("div");
      t.className = "toast " + (kind || "");
      t.innerHTML = `<span class="tdot"></span><span>${esc(msg)}</span>`;
      $("toast-wrap").appendChild(t);
      setTimeout(() => { t.classList.add("out"); setTimeout(() => t.remove(), 320); }, 3200);
    }

    function headers() {
      const h = { Accept: "application/json" };
      if (state.token) h.Authorization = "Bearer " + state.token;
      return h;
    }

    async function fetchDashboard() {
      const res = await fetch("/api/v1/dashboard", { headers: headers() });
      if (res.status === 401) throw new Error(t("tokenInvalid"));
      if (!res.ok) throw new Error(t("requestFailed") + " " + res.status);
      return res.json();
    }

    function formatTTL(sec) {
      if (sec <= 0) return t("expired");
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60);
      if (h > 0) return h + "h " + m + "m";
      return m + "m " + (sec % 60) + "s";
    }

    function animateCount(el, to) {
      const from = Number(el.dataset.v || 0);
      if (from === to) { el.textContent = to; return; }
      const dur = 600, start = performance.now();
      function step(now) {
        const p = Math.min((now - start) / dur, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(from + (to - from) * eased);
        if (p < 1) requestAnimationFrame(step);
        else el.dataset.v = to;
      }
      requestAnimationFrame(step);
    }

    function renderStats(data) {
      const g = data.gateway;
      const chips = [
        `<span class="meta-chip"><code>${esc(g.server_url || "—")}</code></span>`,
        `<span class="meta-chip">${t("defaultDomain")} <code>${esc(g.default_domain)}</code></span>`,
        `<span class="meta-chip">${g.gateway_token_required ? t("tokenRequired") : t("noToken")}</span>`,
      ];
      if (g.smtp_inbound_enabled) chips.push(`<span class="meta-chip">${t("smtpOn")}</span>`);
      $("gateway-meta").innerHTML = chips.join("");

      const items = [
        ["mb", t("statMailboxes"), g.active_mailboxes],
        ["dm", t("statDomains"), g.domain_count],
        ["lk", t("statPairs"), countAllowedEdges(data.links)],
      ];
      let html = items.map(([k, l, v]) =>
        `<div class="stat"><div class="label">${l}</div><div class="value" id="stat-${k}" data-v="${state.prevStats[k] || 0}">${state.prevStats[k] || 0}</div></div>`
      ).join("");
      html += `<div class="stat"><div class="label">${t("statUpdated")}</div><div class="value small">${new Date(data.generated_at).toLocaleTimeString()}</div></div>`;
      $("stats").innerHTML = html;
      items.forEach(([k, , v]) => { animateCount($("stat-" + k), v); state.prevStats[k] = v; });
    }

    function highlight(text, q) {
      if (!q) return esc(text);
      const i = text.toLowerCase().indexOf(q.toLowerCase());
      if (i < 0) return esc(text);
      return esc(text.slice(0, i)) + "<mark>" + esc(text.slice(i, i + q.length)) + "</mark>" + esc(text.slice(i + q.length));
    }

    function renderDomains(data) {
      const q = state.search.trim().toLowerCase();
      $("domain-grid").innerHTML = data.domains.map((d, di) => {
        const domainMatch = d.domain.toLowerCase().includes(q);
        const rows = d.mailboxes.map((email) => {
          const mb = data.mailboxes.find((m) => m.email === email);
          const qn = mb ? mb.queued_messages : 0;
          const sel = state.selected === email ? " selected" : "";
          const name = email.split("@")[0];
          const match = !q || domainMatch || email.toLowerCase().includes(q);
          return `<div class="mailbox-row${sel}${match ? "" : " hide"}" data-email="${esc(email)}">
            <span class="mb-name">${highlight(name, q && !domainMatch ? state.search.trim() : "")}</span>
            <span class="queue-badge${qn > 0 ? " has-msg" : ""}">${qn} ${t("queued")}</span>
          </div>`;
        }).join("");
        const anyVisible = !q || domainMatch || d.mailboxes.some((e) => e.toLowerCase().includes(q));
        return `<div class="card domain-card${d.is_default ? " default" : ""}${anyVisible ? "" : " dimmed"}" style="animation-delay:${di * 0.04}s">
          <div class="domain-head">
            <span class="name">${highlight(d.domain, domainMatch ? state.search.trim() : "")}</span>
            ${d.is_default ? `<span class="badge">${t("defaultBadge")}</span>` : `<span class="pill">${d.mailbox_count} ${t("mailboxes")}</span>`}
          </div>
          <div class="domain-body">${rows}</div>
        </div>`;
      }).join("");

      document.querySelectorAll(".mailbox-row").forEach((el) => el.addEventListener("click", () => selectMailbox(el.dataset.email)));
    }

    function renderDetail(data, email, animate) {
      const mb = data.mailboxes.find((m) => m.email === email);
      const body = $("detail-body");
      if (animate) { body.classList.remove("swap"); void body.offsetWidth; body.classList.add("swap"); }
      if (!mb) { $("detail-content").innerHTML = `<div class="detail-empty">${esc(t("detailMissing"))}</div>`; return; }
      const peerDirs = [];
      data.links.forEach((l) => {
        if (l.from === email) {
          peerDirs.push({ peer: l.to, dir: "out", status: l.forward_status });
        } else if (l.to === email) {
          peerDirs.push({ peer: l.from, dir: "in", status: l.reverse_status });
        }
      });
      peerDirs.sort((a, b) => a.peer.localeCompare(b.peer) || a.dir.localeCompare(b.dir));
      const p = mb.profile || {};

      $("detail-content").innerHTML = `
        <div class="detail-email">${esc(mb.email)}</div>
        <div class="detail-section">
          <h3 data-sec>${t("overview")} <span class="chev">⌄</span></h3>
          <div class="sec-body"><dl class="kv-grid">
            <dt>Domain</dt><dd>${esc(mb.domain)}</dd>
            <dt>${t("registered")}</dt><dd>${fmtTime(mb.registered_at)}</dd>
            <dt>${t("expires")}</dt><dd>${formatTTL(mb.ttl_remaining_seconds)}</dd>
            <dt>${t("queuedMail")}</dt><dd>${mb.queued_messages}</dd>
          </dl></div>
        </div>
        ${p.display_name ? `<div class="detail-section"><h3 data-sec>Profile <span class="chev">⌄</span></h3><div class="sec-body">
          <div class="detail-kv"><strong>${t("name")}</strong>${esc(p.display_name)}</div>
          ${p.host ? `<div class="detail-kv"><strong>Host</strong>${esc(p.host)}</div>` : ""}
          ${p.responsibilities ? `<div class="detail-kv"><strong>${t("responsibilities")}</strong>${esc(p.responsibilities)}</div>` : ""}
          ${renderTags("Skills", p.skills)}${renderTags("MCP", p.mcp_services)}${renderTags(t("capabilities"), p.capabilities)}
          ${p.notes ? `<div class="detail-kv" style="margin-top:0.5rem;color:var(--text-2)">${esc(p.notes)}</div>` : ""}
        </div></div>` : ""}
        <div class="detail-section">
          <h3 data-sec>Inbox Policy <span class="chev">⌄</span></h3><div class="sec-body">
          ${renderTags("Blocklist", mb.inbox_policy?.blocklist || [])}
          ${renderTags("Allowlist", mb.inbox_policy?.allowlist || [])}
          ${!(mb.inbox_policy?.blocklist?.length || mb.inbox_policy?.allowlist?.length) ? `<div class="detail-kv" style="color:var(--text-3)">${esc(t("defaultPolicy"))}</div>` : ""}
        </div></div>
        <div class="detail-section">
          <h3 data-sec>${t("peers")} · ${peerDirs.length} <span class="chev">⌄</span></h3>
          <div class="sec-body link-list">${peerDirs.slice(0, 60).map(peerRow).join("") || `<div class="detail-kv" style="color:var(--text-3)">${t("none")}</div>`}</div>
        </div>`;

      $("detail-content").querySelectorAll("h3[data-sec]").forEach((h) => {
        h.addEventListener("click", () => h.parentElement.classList.toggle("collapsed"));
      });
      $("detail-content").querySelectorAll(".link-row[data-peer]").forEach((r) => {
        r.addEventListener("click", () => selectMailbox(r.dataset.peer));
      });
    }

    function peerRow(l) {
      const arrow = l.dir === "out" ? "→" : "←";
      const label = l.dir === "out" ? t("deliveryOut") : t("deliveryIn");
      return `<div class="link-row" data-peer="${esc(l.peer)}">
        <span class="status-pill status-${statusClass(l.status)}">${esc(statusLabel(l.status))}</span>
        <span class="dir">${arrow} ${esc(l.peer)} <span style="color:var(--text-3)">(${label})</span></span>
      </div>`;
    }

    function renderTags(label, items) {
      if (!items || !items.length) return "";
      return `<div class="detail-kv"><strong>${label}</strong></div><div class="tag-list">${items.map((t) => `<span class="tag">${esc(t)}</span>`).join("")}</div>`;
    }

    function selectMailbox(email) {
      const changed = state.selected !== email;
      state.selected = email;
      if (state.data) { renderDomains(state.data); renderDetail(state.data, email, changed); renderGraph(state.data); }
    }

    function filteredLinks(data) {
      return data.links.filter((l) => {
        if (state.filter === "cross") return !l.same_domain;
        if (state.filter === "blocked") {
          return !deliveryPermits(l.forward_status) || !deliveryPermits(l.reverse_status);
        }
        return true;
      });
    }

    function shortenSegment(ax, ay, bx, by, pad) {
      const dx = bx - ax, dy = by - ay;
      const len = Math.hypot(dx, dy) || 1;
      return {
        x1: ax + (dx / len) * pad,
        y1: ay + (dy / len) * pad,
        x2: bx - (dx / len) * pad,
        y2: by - (dy / len) * pad,
      };
    }

    function curvedPath(x1, y1, x2, y2, offset) {
      const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
      const dx = x2 - x1, dy = y2 - y1;
      const len = Math.hypot(dx, dy) || 1;
      const nx = (-dy / len) * offset * 10;
      const ny = (dx / len) * offset * 10;
      return `M ${x1} ${y1} Q ${mx + nx} ${my + ny} ${x2} ${y2}`;
    }

    function appendAllowedEdge(htmlParts, from, to, status, offset, sel, related) {
      const pad = 22;
      const seg = shortenSegment(from.x, from.y, to.x, to.y, pad);
      const color = edgeColor(status);
      const opacity = sel ? (related ? 0.92 : 0.1) : 0.78;
      const width = related && sel ? 2.5 : 1.85;
      const path = curvedPath(seg.x1, seg.y1, seg.x2, seg.y2, offset);
      htmlParts.push(`<path d="${path}" fill="none" stroke="${color}" stroke-width="${width}" opacity="${opacity}" stroke-linecap="round" marker-end="url(#arrow-allowed)"/>`);
    }

    function renderGraph(data) {
      const svg = $("graph-svg");
      const wrap = svg.parentElement;
      wrap.querySelector(".graph-empty")?.remove();
      if (!data.domains.length) {
        svg.innerHTML = "";
        const e = document.createElement("div"); e.className = "graph-empty"; e.innerHTML = `<div>${esc(t("graphEmpty"))}</div>`;
        wrap.appendChild(e); return;
      }
      const W = Math.max(wrap.clientWidth, 600);
      const domains = data.domains;
      const colW = Math.max(190, W / Math.max(domains.length, 1));
      const nodeH = 44, topPad = 56;
      const positions = {};
      domains.forEach((d, di) => {
        const cx = colW * di + colW / 2;
        d.mailboxes.forEach((email, mi) => { positions[email] = { x: cx, y: topPad + mi * nodeH + 24 }; });
      });
      const maxRows = Math.max(...domains.map((d) => d.mailboxes.length), 1);
      const H = Math.max(440, topPad + maxRows * nodeH + 40);
      svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

      const isDark = document.documentElement.getAttribute("data-theme") === "dark" ||
        (!document.documentElement.getAttribute("data-theme") && window.matchMedia("(prefers-color-scheme: dark)").matches);
      const links = filteredLinks(data);
      const edgeParts = [];
      const sel = state.selected;

      const arrowFill = STATUS_COLORS.allowed;
      let html = `<defs><marker id="arrow-allowed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
        <path d="M 0 1 L 9 5 L 0 9 z" fill="${arrowFill}"/>
      </marker></defs>`;

      links.forEach((l) => {
        const a = positions[l.from], b = positions[l.to];
        if (!a || !b) return;
        const related = !sel || l.from === sel || l.to === sel;
        const fwdOK = deliveryPermits(l.forward_status);
        const revOK = deliveryPermits(l.reverse_status);
        if (!fwdOK && !revOK) return;

        if (fwdOK && revOK) {
          const pad = 22;
          const seg = shortenSegment(a.x, a.y, b.x, b.y, pad);
          const color = edgeColor(l.forward_status === "allowlisted" || l.reverse_status === "allowlisted" ? "allowlisted" : "allowed");
          const opacity = sel ? (related ? 0.9 : 0.1) : 0.75;
          const width = related && sel ? 2.6 : 1.9;
          const path = curvedPath(seg.x1, seg.y1, seg.x2, seg.y2, 0);
          html += `<path d="${path}" fill="none" stroke="${color}" stroke-width="${width}" opacity="${opacity}" stroke-linecap="round"/>`;
          return;
        }

        if (fwdOK) appendAllowedEdge(edgeParts, a, b, l.forward_status, 1, sel, related);
        if (revOK) appendAllowedEdge(edgeParts, b, a, l.reverse_status, -1, sel, related);
      });
      html += edgeParts.join("");

      const boxFill = isDark ? "rgba(44,44,46,0.5)" : "rgba(255,255,255,0.6)";
      const boxStroke = isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.08)";
      const accent = isDark ? "#0a84ff" : "#0071e3";
      const labelColor = isDark ? "#aeaeb2" : "#6e6e73";
      const textColor = isDark ? "#f5f5f7" : "#1d1d1f";

      domains.forEach((d, di) => {
        const x = colW * di + 14, boxH = d.mailboxes.length * nodeH + 42;
        html += `<rect x="${x}" y="16" width="${colW - 28}" height="${boxH}" rx="16" fill="${boxFill}" stroke="${d.is_default ? accent : boxStroke}" stroke-width="${d.is_default ? 1.6 : 1}"/>`;
        html += `<text x="${x + 14}" y="40" fill="${labelColor}" font-size="12" font-weight="600">${esc(d.domain)}</text>`;
        d.mailboxes.forEach((email) => {
          const p = positions[email], on = sel === email;
          html += `<circle cx="${p.x}" cy="${p.y}" r="${on ? 19 : 17}" fill="${on ? accent : (isDark ? "#1c1c1e" : "#ffffff")}" stroke="${accent}" stroke-width="${on ? 3 : 1.75}" data-email="${esc(email)}" style="cursor:pointer"/>`;
          html += `<text x="${p.x}" y="${p.y + 4}" text-anchor="middle" fill="${on ? "#fff" : textColor}" font-size="10" font-weight="600" pointer-events="none">${esc(email.split("@")[0].slice(0, 9))}</text>`;
        });
      });

      svg.innerHTML = html;
      svg.querySelectorAll("circle[data-email]").forEach((c) => c.addEventListener("click", () => selectMailbox(c.getAttribute("data-email"))));
    }

    function esc(s) { return String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/"/g, "&quot;"); }
    function fmtTime(iso) { try { return new Date(iso).toLocaleString(); } catch { return iso; } }

    async function load(manual) {
      try {
        const data = await fetchDashboard();
        state.data = data;
        renderStats(data); renderDomains(data); renderGraph(data);
        if (state.selected) renderDetail(data, state.selected, false);
        if (manual) showToast(t("refreshed"), "ok");
      } catch (e) {
        showToast(e.message || String(e), "err");
        if (e.message && (e.message.includes("Token") || e.message.includes("token"))) showLogin();
      }
    }

    async function doRefresh() {
      const btn = $("refresh-btn");
      btn.classList.add("spinning");
      await load(true);
      setTimeout(() => btn.classList.remove("spinning"), 600);
    }

    function showLogin() { $("login").classList.remove("hidden"); $("logout-btn").style.display = "none"; setTimeout(() => $("token-input").focus(), 100); }
    function hideLogin() { $("login").classList.add("hidden"); $("logout-btn").style.display = state.token ? "inline-flex" : "none"; }

    async function tryLogin(token) {
      state.token = token.trim();
      $("login-error").textContent = "";
      try {
        await fetchDashboard();
        sessionStorage.setItem(TOKEN_KEY, state.token);
        hideLogin();
        await load();
        if (refreshTimer) clearInterval(refreshTimer);
        refreshTimer = setInterval(load, 10000);
      } catch (e) { state.token = ""; $("login-error").textContent = e.message || t("connectFailed"); }
    }

    $("login-btn").addEventListener("click", () => tryLogin($("token-input").value));
    $("token-input").addEventListener("keydown", (e) => { if (e.key === "Enter") tryLogin($("token-input").value); });
    $("logout-btn").addEventListener("click", () => {
      sessionStorage.removeItem(TOKEN_KEY);
      state.token = ""; state.data = null; state.selected = null;
      if (refreshTimer) clearInterval(refreshTimer);
      showLogin();
    });
    $("refresh-btn").addEventListener("click", doRefresh);

    $("filter-seg").querySelectorAll("button").forEach((b) => b.addEventListener("click", () => {
      state.filter = b.dataset.filter;
      $("filter-seg").querySelectorAll("button").forEach((x) => x.classList.toggle("active", x === b));
      if (state.data) renderGraph(state.data);
    }));

    const searchInput = $("search-input");
    searchInput.addEventListener("input", () => {
      state.search = searchInput.value;
      $("search-field").classList.toggle("has-value", !!searchInput.value);
      if (state.data) renderDomains(state.data);
    });
    $("search-clear").addEventListener("click", () => {
      searchInput.value = ""; state.search = "";
      $("search-field").classList.remove("has-value");
      searchInput.focus();
      if (state.data) renderDomains(state.data);
    });

    document.addEventListener("keydown", (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); searchInput.focus(); }
      if (e.key === "Escape" && document.activeElement === searchInput) { searchInput.value = ""; state.search = ""; $("search-field").classList.remove("has-value"); if (state.data) renderDomains(state.data); }
    });

    window.addEventListener("resize", () => state.data && renderGraph(state.data));

    (async function init() {
      const saved = sessionStorage.getItem(TOKEN_KEY);
      if (saved) { await tryLogin(saved); return; }
      try {
        const r = await fetch("/api/v1/dashboard", { headers: { Accept: "application/json" } });
        if (r.ok) { hideLogin(); state.token = ""; await load(); refreshTimer = setInterval(load, 10000); }
        else showLogin();
      } catch { showLogin(); }
    })();
  </script>
</body>
</html>
