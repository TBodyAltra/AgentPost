services:
  agentpost:
    build: .
    container_name: agentpost
    restart: unless-stopped
    ports:
      - "${AGENTPOST_HTTP_PORT:-8080}:8080"
      - "${AGENTPOST_SMTP_PUBLISH_PORT:-2525}:2525"
    environment:
      AGENTPOST_DOMAIN: ${AGENTPOST_DOMAIN:-agent.local}
      AGENTPOST_HTTP_ADDR: ":8080"
      AGENTPOST_SMTP_ADDR: ${AGENTPOST_SMTP_ADDR:-}
      AGENTPOST_ALLOW_EXTERNAL_RELAY: "false"
      AGENTPOST_API_TOKEN: ${AGENTPOST_API_TOKEN:-}
      AGENTPOST_CONNECT_LOCALHOST: ${AGENTPOST_CONNECT_LOCALHOST:-}
      AGENTPOST_CONNECT_LAN: ${AGENTPOST_CONNECT_LAN:-}
      AGENTPOST_CONNECT_PUBLIC: ${AGENTPOST_CONNECT_PUBLIC:-}
      AGENTPOST_CONNECT_DOMAIN: ${AGENTPOST_CONNECT_DOMAIN:-}
      AGENTPOST_REQUIRE_TOKEN: ${AGENTPOST_REQUIRE_TOKEN:-1}
      AGENTPOST_ENABLE_CADDY: ${AGENTPOST_ENABLE_CADDY:-0}
      AGENTPOST_DATA_DIR: ${AGENTPOST_DATA_DIR:-/app/.agentpost/data}
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./.agentpost:/app/.agentpost
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  caddy:
    profiles: ["caddy"]
    image: caddy:2-alpine
    container_name: agentpost-caddy
    restart: unless-stopped
    depends_on:
      agentpost:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
