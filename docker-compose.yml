services:
  agentpost:
    build: .
    container_name: agentpost
    restart: unless-stopped
    ports:
      - "${AGENTPOST_HTTP_PORT:-8080}:8080"
      - "${AGENTPOST_SMTP_PORT:-2525}:2525"
    environment:
      AGENTPOST_DOMAIN: ${AGENTPOST_DOMAIN:-agent.local}
      AGENTPOST_HTTP_ADDR: ":8080"
      AGENTPOST_SMTP_ADDR: ${AGENTPOST_SMTP_ADDR:-}
      AGENTPOST_ALLOW_EXTERNAL_RELAY: "false"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
