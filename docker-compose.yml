services:
  getpost:
    build: .
    container_name: getpost
    restart: unless-stopped
    ports:
      - "${GETPOST_HTTP_PORT:-8080}:8080"
      - "${GETPOST_SMTP_PORT:-2525}:2525"
    environment:
      GETPOST_DOMAIN: ${GETPOST_DOMAIN:-agent.local}
      GETPOST_HTTP_ADDR: ":8080"
      GETPOST_SMTP_ADDR: ${GETPOST_SMTP_ADDR:-}
      GETPOST_ALLOW_EXTERNAL_RELAY: "false"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
